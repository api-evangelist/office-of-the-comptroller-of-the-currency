description: >-
  The Office of the Comptroller of the Currency (OCC) is a federal agency responsible
  for regulating and supervising national banks and federal savings associations.
  The OCC ensures that these financial institutions operate in a safe and sound manner,
  comply with applicable laws and regulations, and treat customers fairly.
